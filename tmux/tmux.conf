# tmux.conf — dot configuration

# Terminal — base terminal type
set -g default-terminal "tmux-256color"

# True color support
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# Undercurl support (colored underlines)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Extended features for tmux 3.2+ (ignored silently on older versions)
set -gq terminal-features ",xterm-ghostty:256:RGB:mouse:cstyle:overline:strikethrough:usstyle"
set -gq terminal-features ",xterm-256color:256:RGB"

# Forward credentials through tmux — re-imported from attaching client on each attach
set -g update-environment "GH_TOKEN GITHUB_TOKEN GIT_AUTHOR_NAME GIT_AUTHOR_EMAIL GIT_COMMITTER_NAME GIT_COMMITTER_EMAIL AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN AWS_PROFILE AWS_REGION AWS_DEFAULT_REGION SSH_AUTH_SOCK SSH_CONNECTION"

# General
set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g set-clipboard on

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Window/pane management
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status bar
set -g status-style "bg=default,fg=green"
set -g status-left "#[bold]#S "
set -g status-right "#H %H:%M"

# Reload
bind r source-file ~/.tmux.conf \; display "Reloaded"
